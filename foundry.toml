# Foundry Configuration for Smart Contract Testing
# Reference: 02_MVP_IMPLEMENTATION_PLAN.md Phase 5

[profile.default]
src = 'contracts/MVP'
out = 'out'
libs = ['node_modules', 'lib']
test = 'test'
cache_path = 'cache'

# Compiler settings
solc_version = '0.8.20'
via_ir = true
optimizer = true
optimizer_runs = 200

# Fuzz testing
fuzz_runs = 256
fuzz_max_local_rejects = 65536
fuzz_max_global_rejects = 65536

# Invariant testing
invariant_runs = 256
invariant_depth = 15
invariant_fail_on_revert = false

# Gas reports
gas_reports = ['*']

# RPC endpoints for forking
[etherscan]
polygon_amoy = { key = "${POLYGONSCAN_API_KEY}" }

[rpc_endpoints]
polygon_amoy = "https://rpc-amoy.polygon.technology/"
polygon_mainnet = "https://polygon-rpc.com/"

# Profile for detailed gas reporting
[profile.gas]
gas_limit = "1000000000"

# Profile for coverage
[profile.ci]
fuzz_runs = 1000
invariant_runs = 1000
